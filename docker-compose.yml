services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
