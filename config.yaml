llm:
  model_id: "claude-haiku-4-5-20251001"

embeddings:
  model_id: "voyage-3-large"
  dimensions: 1024

qdrant:
  collection: "aya_kb"
  host: "localhost"
  port: 6333

redis:
  host: "localhost"
  port: 6379
  cache_ttl_seconds: 86400  # 24 hours

rag:
  chunk_size: 512
  chunk_overlap: 64
  retrieval_top_k: 5
  retrieval_confidence_threshold: 0.65
  cache_similarity_threshold: 0.92

voice:
  inactivity_timeout_seconds: 600  # 10 minutes
  wake_phrases:
    - "hey aya"
    - "summon aya"
    - "question aya"
  activation_rate_limit_seconds: 5
